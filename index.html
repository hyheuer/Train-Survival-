<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />

  <title>Retro Rail Survival</title>
  <style>
    :root {
      --bg:#141821; --panel:#22283a; --text:#f4e7b3; --accent:#9ef08f; --danger:#ff6464;

    }
    html,body{height:100%;width:100%;overflow:hidden}
    *{box-sizing:border-box} body{margin:0;min-height:100dvh;display:flex;justify-content:center;align-items:center;background:radial-gradient(circle at top,#2a3146 0%,var(--bg) 60%);color:var(--text);font-family:"Courier New",monospace;overscroll-behavior:none;touch-action:manipulation;position:fixed;inset:0}
    .game-shell{width:min(97vw,1280px);max-height:100dvh;overflow:auto;-webkit-overflow-scrolling:touch;padding:10px;border:4px solid #3d4358;border-radius:16px;background:linear-gradient(180deg,#202638,#161b29);box-shadow:0 20px 60px rgba(0,0,0,.35),inset 0 0 0 3px rgba(255,255,255,.05)}
    header{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:7px} h1{margin:0;font-size:clamp(1.05rem,2.4vw,1.7rem);letter-spacing:2px;text-shadow:3px 3px 0 #000}.hud{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;font-size:.84rem}.badge,.mode-btn{padding:6px 9px;border:2px solid #555f7c;border-radius:9px;background:var(--panel);color:var(--text);box-shadow:inset 0 -3px 0 rgba(0,0,0,.25);white-space:nowrap;font-family:inherit}.mode-btn{cursor:pointer;color:#172017;background:var(--accent);border:0;font-weight:bold;box-shadow:0 4px 0 #4f9d45}
    .play-area{display:grid;grid-template-columns:minmax(390px,1fr) 520px;gap:10px;align-items:start}.game-column{position:relative;display:flex;flex-direction:column;gap:8px}#game{width:100%;height:auto;aspect-ratio:16/10;display:block;border:4px solid #0c0f17;border-radius:12px;background:#355e3b;image-rendering:pixelated;box-shadow:inset 0 0 0 4px rgba(255,255,255,.06);touch-action:none;user-select:none;-webkit-user-select:none}.game-over-restart{display:none;position:absolute;left:50%;top:56%;z-index:5;transform:translate(-50%,-50%);cursor:pointer;border:0;border-radius:12px;padding:14px 24px;color:#172017;background:var(--accent);font-family:inherit;font-size:1.05rem;font-weight:bold;box-shadow:0 6px 0 #4f9d45,0 14px 28px rgba(0,0,0,.35)}.game-over-restart.show{display:block}.game-over-restart:active{transform:translate(-50%,-44%);box-shadow:0 2px 0 #4f9d45,0 8px 16px rgba(0,0,0,.35)}
    .preview-controls{display:none;grid-template-columns:auto minmax(160px,1fr) auto;gap:10px;align-items:center;padding:8px 10px;border:4px solid #0c0f17;border-radius:12px;background:linear-gradient(180deg,#252d42,#171d2c);box-shadow:inset 0 0 0 3px rgba(255,255,255,.05)}.preview-controls button{width:40px;height:34px;display:grid;place-items:center;cursor:pointer;border:0;border-radius:9px;color:#172017;background:var(--accent);font-family:inherit;font-size:1rem;font-weight:bold;box-shadow:0 4px 0 #4f9d45}.preview-controls button:disabled{opacity:.55;cursor:not-allowed}.preview-controls input{width:100%;accent-color:#9ef08f}.preview-time{min-width:52px;text-align:right;font-weight:bold;color:#f4e7b3;text-shadow:2px 2px 0 #000}.distance-panel{min-height:100%;border:4px solid #0c0f17;border-radius:12px;padding:10px;background:linear-gradient(180deg,#1f2638,#141a28);box-shadow:inset 0 0 0 4px rgba(255,255,255,.06);overflow:hidden}.distance-title{margin:0 0 6px;text-align:center;font-size:.86rem;letter-spacing:1px;text-shadow:2px 2px 0 #000}#distanceCanvas{width:100%;height:340px;min-height:340px;display:block;border:3px solid #3d4358;border-radius:10px;background:#101622;image-rendering:pixelated;touch-action:none;user-select:none;-webkit-user-select:none}.graph-controls{display:none;grid-template-columns:1fr 1fr;gap:8px;align-items:center;margin-top:8px;padding:8px;border:2px solid #555f7c;border-radius:10px;background:rgba(0,0,0,.22);font-size:.78rem}.graph-controls button{cursor:pointer;border:0;border-radius:8px;padding:8px 10px;color:#172017;background:var(--accent);font-family:inherit;font-weight:bold}.graph-controls button:disabled{opacity:.55;cursor:not-allowed}.distance-value{margin-top:8px;padding:7px;border:2px solid #555f7c;border-radius:10px;background:rgba(0,0,0,.22);text-align:center;line-height:1.25;box-shadow:inset 0 -3px 0 rgba(0,0,0,.25)}.distance-value strong{display:block;color:var(--accent);font-size:1.2rem;text-shadow:2px 2px 0 #000}.graph-archive{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px;min-height:42px}.graph-tile{width:74px;height:38px;position:relative;cursor:pointer;border:2px solid #555f7c;border-radius:8px;background:#101622;color:#f4e7b3;font-family:inherit;box-shadow:inset 0 -3px 0 rgba(0,0,0,.3);overflow:hidden}.graph-tile:disabled{cursor:default;opacity:.55}.graph-tile.active{border-color:#ffdd66;box-shadow:0 0 14px rgba(255,221,102,.45),inset 0 -3px 0 rgba(0,0,0,.3)}.graph-tile canvas{position:absolute;inset:0;width:100%;height:100%;image-rendering:pixelated}.graph-tile span{position:absolute;left:5px;top:3px;font-size:.65rem;font-weight:bold;text-shadow:2px 2px 0 #000}
    .score-strip{display:flex;justify-content:center;align-items:center;gap:10px;margin-top:8px;padding:8px 12px;border:4px solid #0c0f17;border-radius:12px;background:linear-gradient(180deg,#242c40,#151b29);box-shadow:inset 0 0 0 3px rgba(255,255,255,.05);font-weight:bold;text-align:center;flex-wrap:wrap}.score-label{font-size:.78rem;color:#d8d2aa;letter-spacing:1px;text-transform:uppercase}.score-value{min-width:58px;padding:3px 10px;border:2px solid #555f7c;border-radius:8px;background:#101622;color:#ffdd66;font-size:1.25rem;text-shadow:2px 2px 0 #000;box-shadow:inset 0 -3px 0 rgba(0,0,0,.35)}.score-total{color:#9ef08f}.avatar-shop{display:flex;align-items:center;gap:7px;flex-wrap:wrap;padding:8px 10px;border:4px solid #0c0f17;border-radius:12px;background:linear-gradient(180deg,#242c40,#151b29);box-shadow:inset 0 0 0 3px rgba(255,255,255,.05)}.avatar-shop-label{font-size:.76rem;color:#d8d2aa;letter-spacing:1px;text-transform:uppercase}.avatar-btn{min-width:86px;cursor:pointer;border:2px solid #555f7c;border-radius:8px;padding:6px 8px;background:#101622;color:#f4e7b3;font-family:inherit;font-size:.72rem;font-weight:bold;box-shadow:inset 0 -3px 0 rgba(0,0,0,.35)}.avatar-btn.owned{border-color:#607255}.avatar-btn.selected{border-color:#ffdd66;color:#ffdd66;box-shadow:0 0 12px rgba(255,221,102,.35),inset 0 -3px 0 rgba(0,0,0,.35)}.avatar-btn.locked{color:#9ba1b4}.avatar-btn:disabled{opacity:.55;cursor:not-allowed}.score-value.score-pop{animation:scorePop .9s ease-out}@keyframes scorePop{0%{transform:scale(1);color:#ffdd66;box-shadow:0 0 0 rgba(255,221,102,0),inset 0 -3px 0 rgba(0,0,0,.35)}25%{transform:scale(1.22);color:#fff4a8;box-shadow:0 0 22px rgba(255,221,102,.9),inset 0 -3px 0 rgba(0,0,0,.35)}55%{transform:scale(.96);color:#9ef08f;box-shadow:0 0 14px rgba(158,240,143,.65),inset 0 -3px 0 rgba(0,0,0,.35)}100%{transform:scale(1);color:#ffdd66;box-shadow:0 0 0 rgba(255,221,102,0),inset 0 -3px 0 rgba(0,0,0,.35)}}.tablet-controls{display:flex;justify-content:space-between;align-items:center;gap:18px;margin-top:8px;padding:0 2px;pointer-events:none}.move-btn{width:min(42vw,430px);height:84px;display:flex;justify-content:center;align-items:center;border:3px solid #606b8d;border-radius:16px;color:#f4e7b3;background:linear-gradient(180deg,rgba(48,58,84,.96),rgba(27,34,51,.96));box-shadow:0 5px 0 #0c0f17,0 10px 18px rgba(0,0,0,.28),inset 0 2px 0 rgba(255,255,255,.08);font-family:inherit;font-weight:bold;touch-action:none;user-select:none;-webkit-user-select:none;pointer-events:auto}.move-btn .arrow{font-size:4.4rem;line-height:1;color:var(--accent);text-shadow:4px 4px 0 #000}.move-btn:active,.move-btn.active{transform:translateY(4px);box-shadow:0 1px 0 #0c0f17,0 4px 10px rgba(0,0,0,.3),inset 0 2px 0 rgba(255,255,255,.08);background:linear-gradient(180deg,rgba(59,71,102,.98),rgba(34,42,62,.98))}.level-flash{animation:flashLevel .8s ease-out}@keyframes flashLevel{0%{filter:brightness(1)}25%{filter:brightness(1.8)}100%{filter:brightness(1)}}
    .controls{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:6px;color:#d8d2aa;font-size:.86rem;line-height:1.25}
    @media(max-width:900px){body{align-items:flex-start;padding-top:10px}.game-shell{padding:12px}header,.controls{flex-direction:column;align-items:stretch}.hud{justify-content:space-between}.play-area{grid-template-columns:1fr}.distance-panel{min-height:260px}#distanceCanvas{height:220px;min-height:220px}.graph-controls{grid-template-columns:1fr 1fr}.preview-controls{grid-template-columns:auto minmax(120px,1fr) auto}}
  </style>
</head>
<body>
<main class="game-shell">
  <header><h1 id="title">RETRO RAIL SURVIVAL</h1><div class="hud"><button id="railStyleBtn" class="mode-btn">Spielweise: Frei</button><div class="badge">Level: <span id="level">1</span></div><div class="badge">Zeit: <span id="time">0.0</span>s</div><div class="badge">Status: <span id="status">Bereit</span></div></div></header>
  <div class="play-area"><div class="game-column"><canvas id="game" width="960" height="600"></canvas><button id="gameOverRestartBtn" class="game-over-restart">Neustart</button><div class="score-strip"><span class="score-label">Gesamtpunktzahl</span><strong id="totalScoreValue" class="score-value score-total">0</strong></div><div id="avatarShop" class="avatar-shop" aria-label="Avatar-Shop"></div><div id="previewControls" class="preview-controls"><button id="previewPlayBtn" aria-label="Vorschau abspielen">▶</button><input id="previewSlider" type="range" min="0" max="15" step="0.1" value="0" aria-label="Vorschau-Zeit"><span id="previewTimeValue" class="preview-time">0.0s</span></div></div><aside class="distance-panel"><p class="distance-title" id="graphTitle">GLEIS-ZEIT-DIAGRAMM</p><canvas id="distanceCanvas" width="520" height="460"></canvas><div id="graphControls" class="graph-controls"><button id="graphPhaseBtn">Start</button><button id="graphResetBtn">Reset Graph</button></div><div class="distance-value">Position / Zeit<strong><span id="distanceValue">0</span>%</strong><span id="distanceBlocks">t = 0.0 / 15s | Spur 3</span></div><div id="graphArchive" class="graph-archive" aria-label="Absolvierte Level-Graphen"></div></aside></div>
  <div class="tablet-controls"><button id="upBtn" class="move-btn" aria-label="Spur hoch"><span class="arrow">▲</span></button><button id="downBtn" class="move-btn" aria-label="Spur runter"><span class="arrow">▼</span></button></div>
  <section class="controls"><div id="helpText">Schienen: Zügen ausweichen. Alle 15 Sekunden steigt das Level automatisch.</div></section>
</main>
<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d'),distanceCanvas=document.getElementById('distanceCanvas'),dctx=distanceCanvas.getContext('2d');
const titleEl=document.getElementById('title'),graphTitleEl=document.getElementById('graphTitle'),levelEl=document.getElementById('level'),timeEl=document.getElementById('time'),statusEl=document.getElementById('status'),railStyleBtn=document.getElementById('railStyleBtn'),previewControls=document.getElementById('previewControls'),previewPlayBtn=document.getElementById('previewPlayBtn'),previewSlider=document.getElementById('previewSlider'),previewTimeValue=document.getElementById('previewTimeValue'),graphPhaseBtn=document.getElementById('graphPhaseBtn'),gameOverRestartBtn=document.getElementById('gameOverRestartBtn'),helpText=document.getElementById('helpText'),distanceValueEl=document.getElementById('distanceValue'),distanceBlocksEl=document.getElementById('distanceBlocks'),totalScoreValueEl=document.getElementById('totalScoreValue'),avatarShopEl=document.getElementById('avatarShop'),graphArchiveEl=document.getElementById('graphArchive'),graphControls=document.getElementById('graphControls'),graphResetBtn=document.getElementById('graphResetBtn'),tabletControls=document.querySelector('.tablet-controls');
const W=960,H=600,timeLimit=15,lanes=[110,205,300,395,490],laneDirections=[1,-1,1,-1,1],trainColors=['#b83b3b','#355fa8','#d3a331','#7b4fac','#2f9b8f'];
const avatarCatalog=[{id:'human',label:'Mensch',cost:0},{id:'dog',label:'Hund',cost:1},{id:'skateboard',label:'Skateboard',cost:5},{id:'car',label:'Auto',cost:10}];
const keys=new Set(),mobileKeys=new Set(),graphSpeed=1.85;let railStyle='free',railPhase='preview',level=1,freeLevel=1,graphLevel=1,score=0,totalScore=loadTotalScore(),selectedAvatar=loadSelectedAvatar(),player,hazards,sparks,gameState,startTime,elapsed,lastTime,distanceHistory,safeLaneSequence,safeLaneIndex,currentSafeLane,nextWaveTime,railTimeline=[],railSafePlan=[],graphTargets=[],graphPath=[],freeGraphArchive=[],graphModeArchive=[],selectedGraphArchive=null,graphDrawing=false,lastGraphIndex=null,lastGraphValue=null,previewPlaying=false,previewTime=0,levelSignal=0;
function rand(a,b){return Math.random()*(b-a)+a}function rectsOverlap(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}
function laneMeters(i){return (lanes.length-1-i)*5}
function loadTotalScore(){try{return Number(localStorage.getItem('retroRailTotalScore'))||0}catch(e){return 0}}
function saveTotalScore(){try{localStorage.setItem('retroRailTotalScore',String(totalScore))}catch(e){}}
function loadSelectedAvatar(){try{const saved=localStorage.getItem('retroRailSelectedAvatar')||'human';return avatarCatalog.some(a=>a.id===saved)?saved:'human'}catch(e){return 'human'}}
function saveAvatarState(){try{localStorage.setItem('retroRailSelectedAvatar',selectedAvatar)}catch(e){}}
function generateSafeLaneSequence(startLane=2){const seq=[startLane],visited=new Set(seq);let cur=startLane,prev=null,dir=Math.random()<.5?-1:1,holdBudget=2+Math.floor(Math.random()*3);const targetLen=22+Math.floor(Math.random()*7);while(seq.length<targetLen||visited.size<lanes.length){if(holdBudget>0&&seq.length>2&&Math.random()<.12){seq.push(cur);holdBudget--;continue}let opts=[];if(cur>0)opts.push(cur-1);if(cur<lanes.length-1)opts.push(cur+1);const unvisited=opts.filter(o=>!visited.has(o));let weighted=opts.slice();if(unvisited.length&&Math.random()<.65)weighted=unvisited;else if(prev!==null&&weighted.length>1&&Math.random()<.48)weighted=weighted.filter(o=>o!==prev);const pref=cur+dir;let next=(weighted.includes(pref)&&Math.random()<.46)?pref:weighted[Math.floor(Math.random()*weighted.length)];if(prev!==null&&opts.includes(prev)&&Math.random()<.18)next=prev;prev=cur;cur=next;if(cur===0)dir=1;if(cur===lanes.length-1)dir=-1;seq.push(cur);visited.add(cur)}return seq}
function updateScoreDisplays(){if(!avatarUnlockedForPurchase(selectedAvatar))selectedAvatar='human';totalScoreValueEl.textContent=totalScore;renderAvatarShop()}
function addTotalPoints(amount){if(amount<=0)return;totalScore+=amount;score=0;saveTotalScore();updateScoreDisplays();totalScoreValueEl.classList.remove('score-pop');void totalScoreValueEl.offsetWidth;totalScoreValueEl.classList.add('score-pop')}
function bankRunScore(){score=0;updateScoreDisplays()}
function avatarUnlockedForPurchase(id){const item=avatarCatalog.find(a=>a.id===id);return !!item&&totalScore>=item.cost}
function buyOrSelectAvatar(id){const item=avatarCatalog.find(a=>a.id===id);if(!item)return;if(!avatarUnlockedForPurchase(id)){statusEl.textContent=`${item.label} ab ${item.cost} Gesamtpunkten`;return}selectedAvatar=id;statusEl.textContent=`Avatar: ${item.label}`;saveAvatarState();renderAvatarShop()}
function renderAvatarShop(){if(!avatarShopEl)return;if(!avatarUnlockedForPurchase(selectedAvatar))selectedAvatar='human';avatarShopEl.replaceChildren?avatarShopEl.replaceChildren():avatarShopEl.innerHTML='';const label=document.createElement('span');label.className='avatar-shop-label';label.textContent='Avatare';avatarShopEl.appendChild(label);avatarCatalog.forEach(item=>{const unlocked=avatarUnlockedForPurchase(item.id),btn=document.createElement('button');btn.type='button';btn.className='avatar-btn '+(unlocked?'owned':'locked')+(selectedAvatar===item.id?' selected':'');btn.textContent=unlocked?(selectedAvatar===item.id?`${item.label} ✓`:item.label):`${item.label} ab ${item.cost}`;btn.disabled=!unlocked;btn.title=unlocked?'Avatar wählen':`Ab ${item.cost} Gesamtpunkten freigeschaltet`;btn.addEventListener('click',()=>buyOrSelectAvatar(item.id));avatarShopEl.appendChild(btn)})}
function restartGame(){bankRunScore();resetGame(1)}
function currentModeLevel(){return railStyle==='graph'?graphLevel:freeLevel}
function setCurrentModeLevel(v){if(railStyle==='graph')graphLevel=v;else freeLevel=v;level=v}
function switchRailStyle(){const target=railStyle==='free'?'graph':'free',pin=prompt(target==='graph'?'Pincode für Spielweise Graph:':'Pincode für Spielweise Frei:');if(pin===null)return;if((target==='graph'&&pin!=='1235')||(target==='free'&&pin!=='Admin!')){statusEl.textContent='Falscher Pincode';return}bankRunScore();previewPlaying=false;railStyle=target;railPhase='plan';graphTargets=[];graphPath=[];selectedGraphArchive=null;resetGame(currentModeLevel(),2,lanes[2],true)}
function resetGame(nextLevel=1,startLane=2,startY=lanes[startLane],keepScore=false){const previousLevel=level;setCurrentModeLevel(nextLevel);const levelChanged=nextLevel!==previousLevel;if(!keepScore){score=0;if(railStyle==='graph')graphModeArchive=[];else freeGraphArchive=[];selectedGraphArchive=null;totalScoreValueEl.classList.remove('score-pop');renderGraphArchive()}player={x:W/2,y:startY,vy:0,w:38,h:58,alive:true,targetLane:startLane};hazards=[];sparks=[];distanceHistory=[];safeLaneSequence=generateSafeLaneSequence(startLane);safeLaneIndex=0;currentSafeLane=safeLaneSequence[0];nextWaveTime=rand(.85,1.2);gameState='running';startTime=performance.now();elapsed=0;lastTime=performance.now();railTimeline=createRailTimeline();if(!graphTargets.length||(railStyle==='graph'&&levelChanged))resetGraphToMiddle();buildGraphPath();railStyle==='free'?seedInitialTrains():resetRailGraphAttempt(railPhase);updateModeLabels();statusEl.textContent=railStyle==='graph'?phaseStatusText():'Läuft';levelEl.textContent=level;updateScoreDisplays()}
function phaseStatusText(){return railPhase==='preview'?'Vorschau':railPhase==='play'?'Graph-Spiel':'Bereit'}
function setPreviewTime(t){previewTime=Math.max(0,Math.min(timeLimit,t));elapsed=previewTime;hazards=getRailHazardsAt(previewTime);previewSlider.value=previewTime.toFixed(1);previewTimeValue.textContent=`${previewTime.toFixed(1)}s`}
function resetRailGraphAttempt(nextPhase='plan'){railPhase=nextPhase;previewPlaying=nextPhase==='preview';selectedGraphArchive=null;setPreviewTime(0);player.x=W/2;player.y=lanes[2];player.vy=0;player.targetLane=2;player.alive=true;gameState='running';startTime=performance.now();distanceHistory=[];timeEl.textContent='0.0';distanceValueEl.textContent='0';distanceBlocksEl.textContent=`t = 0.0 / ${timeLimit}s | s = 10.0 m`;statusEl.textContent=phaseStatusText();updateModeLabels()}
function graphLocked(){return railStyle==='graph'&&railPhase==='play'&&gameState==='running'}
function updateModeLabels(){const graphActive=railStyle==='graph';graphControls.style.display=graphActive?'grid':'none';previewControls.style.display=graphActive?'grid':'none';tabletControls.style.display=graphActive?'none':'flex';gameOverRestartBtn.classList.toggle('show',gameState==='dead');const locked=graphLocked();graphResetBtn.disabled=previewPlayBtn.disabled=previewSlider.disabled=locked;graphPhaseBtn.textContent='Start';previewPlayBtn.textContent=previewPlaying?'⏸':'▶';previewPlayBtn.setAttribute('aria-label',previewPlaying?'Vorschau pausieren':'Vorschau abspielen');previewTimeValue.textContent=`${previewTime.toFixed(1)}s`;titleEl.textContent=railStyle==='graph'?'RETRO RAIL GRAPH':'RETRO RAIL SURVIVAL';graphTitleEl.textContent=railStyle==='graph'?'ABSTAND ZUM BAHNHOF s(t)':'ABSTAND ZUM BAHNHOF';railStyleBtn.textContent=railStyle==='graph'?'Spielweise: Graph':'Spielweise: Frei';helpText.textContent=railStyle==='graph'?(locked?'Graph-Spiel: Der Mensch folgt dem gezeichneten Graphen. Bearbeiten ist gesperrt.':'Graph bearbeitbar: Zeichne den durchgehenden Abstand s(t) zum Bahnhof und starte mit demselben Zugverlauf.'):`Schienen-Modus: Bewege dich fließend zwischen den Gleisen. Alle ${timeLimit} Sekunden folgt automatisch das nächste Level.`}
function difficulty(){return Math.min(18,level-1)}
function pointsForCompletedLevel(){return Math.pow(2,Math.max(0,level-1))}
function trainWaveInterval(){return Math.max(.85,2.25-difficulty()*.12)}
function trainSpeedBase(){return 225+difficulty()*33}
function createTrainOnLane(lane,startInside=false){const dir=laneDirections[lane],len=rand(210,300)+difficulty()*10,speed=rand(trainSpeedBase(),trainSpeedBase()+85),y=lanes[lane]-21,x=startInside?(dir===1?rand(-len+30,W-150):rand(150,W-30)):(dir===1?-len-40:W+40);return{kind:'train',x,y,w:len,h:42,speed,direction:dir,color:trainColors[Math.floor(Math.random()*trainColors.length)],laneIndex:lane,windowOffset:Math.random()*10}}
function laneOverlapsPlayer(lane){const p={y:player.y-37,h:74},h={y:lanes[lane]-16,h:32};return p.y<h.y+h.h&&p.y+p.h>h.y}
function seedInitialTrains(){lanes.forEach((_,lane)=>{if(lane===currentSafeLane||laneOverlapsPlayer(lane))return;const t=createTrainOnLane(lane,true);t.speed=trainSpeedBase();if(t.x<W/2&&t.x+t.w>W/2-80)t.x-=220;if(t.x<W/2+80&&t.x+t.w>W/2)t.x+=220;hazards.push(t)})}
function trainsOverlapOnLane(a,b,pad=28){return a.laneIndex===b.laneIndex&&a.x<b.x+b.w+pad&&a.x+a.w+pad>b.x}
function trainOverlapsActive(train){return hazards.some(h=>trainsOverlapOnLane(h,train,42))}
function spawnTrainWave(){safeLaneIndex=Math.min(safeLaneIndex+1,safeLaneSequence.length-1);currentSafeLane=safeLaneSequence[safeLaneIndex];lanes.forEach((_,lane)=>{if(lane===currentSafeLane)return;const t=createTrainOnLane(lane,false);t.speed=trainSpeedBase()+35;t.w=rand(220,315+difficulty()*7);if(!trainOverlapsActive(t))hazards.push(t)})}
function railSafeStep(){return Math.max(1.35,3.05-difficulty()*.28)}

errt':'Strecken-Graph',m.x0+10,m.mt+17)}else{if(gameState==='running'){const last=distanceHistory[distanceHistory.length-1];if(!last||elapsed-last.t>.05)distanceHistory.push({t:Math.min(elapsed,timeLimit),p:data.graphPosition})}if(distanceHistory.length>1){dctx.beginPath();distanceHistory.forEach((pt,i)=>{const x=m.x0+(pt.t/timeLimit)*m.gw,y=m.y0-pt.p*m.gh;i?dctx.lineTo(x,y):dctx.moveTo(x,y)});dctx.strokeStyle='#9ef08f';dctx.lineWidth=4;dctx.stroke()}}const markerValue=railStyle==='graph'?graphValueAt(Math.min(elapsed,timeLimit)):(1-data.graphPosition)*(lanes.length-1),px=m.x0+(Math.min(elapsed,timeLimit)/timeLimit)*m.gw,py=graphLaneToY(markerValue,m);dctx.fillStyle='#000';dctx.fillRect(px-7,py-7,14,14);dctx.fillStyle='#4ea1ff';dctx.fillRect(px-5,py-5,10,10);dctx.font='bold 13px Courier New';dctx.textAlign='center';dctx.fillStyle='#9ef08f';dctx.fillText('s(t)',m.x0+m.gw-18,m.mt+16)}
function drawOverlay(){if(gameState==='running')return;ctx.fillStyle='rgba(0,0,0,.62)';ctx.fillRect(0,0,W,H);if(gameState==='dead'){drawPixelText('GAME OVER',W/2,H/2-35,54,'center','#ff6464');drawPixelText('Du wurdest vom Zug erwischt!',W/2,H/2+12,22,'center','#f4e7b3')}}
function popScore(){updateScoreDisplays();totalScoreValueEl.classList.remove('score-pop');void totalScoreValueEl.offsetWidth;totalScoreValueEl.classList.add('score-pop')}
function advanceFreeLevel(){saveCompletedGraph();addTotalPoints(pointsForCompletedLevel());setCurrentModeLevel(freeLevel+1);const laneSpan=lanes[lanes.length-1]-lanes[0],idx=Math.round(Math.max(0,Math.min(lanes.length-1,((player.y-lanes[0])/laneSpan)*(lanes.length-1))));safeLaneSequence=generateSafeLaneSequence(idx);safeLaneIndex=0;currentSafeLane=safeLaneSequence[0];nextWaveTime=rand(.35,.7);hazards.forEach(t=>{t.speed*=1.06});distanceHistory=[];startTime=performance.now();elapsed=0;levelSignal=.8;statusEl.textContent=`Level ${level}`;levelEl.textContent=level;popScore();titleEl.classList.remove('level-flash');void titleEl.offsetWidth;titleEl.classList.add('level-flash')}
function awardGraphLevelPoints(){addTotalPoints(pointsForCompletedLevel())}
function advanceLevel(){if(railStyle==='graph'){saveCompletedGraph();awardGraphLevelPoints();railPhase='plan';resetGame(graphLevel+1,2,lanes[2],true)}else advanceFreeLevel();levelSignal=.8;statusEl.textContent=`Level ${level}`;titleEl.classList.remove('level-flash');void titleEl.offsetWidth;titleEl.classList.add('level-flash')}
function updateHud(){if(gameState==='running'){if(railStyle==='graph'&&railPhase==='plan'){elapsed=0;previewPlaying=false}else if(railStyle==='graph'&&railPhase==='preview'){if(previewPlaying){setPreviewTime((performance.now()-startTime)/1000);if(previewTime>=timeLimit){previewPlaying=false;statusEl.textContent='Vorschau pausiert';updateModeLabels()}}else elapsed=previewTime}else{elapsed=(performance.now()-startTime)/1000;if(elapsed>=timeLimit&&player.alive){advanceLevel();return}}}const data=getProgressData();timeEl.textContent=elapsed.toFixed(1);levelEl.textContent=level;distanceValueEl.textContent=data.percent;distanceBlocksEl.textContent=`t = ${elapsed.toFixed(1)} / ${timeLimit}s | s = ${data.meters.toFixed(1)} m`}
function loop(now){const dt=Math.min(.033,(now-lastTime)/1000);lastTime=now;updateHud();updatePlayer(dt);updateWorld(dt);updateSparks(dt);drawBackground();hazards.forEach(drawTrain);checkCollisions();drawSparks();drawPlayer();drawOverlay();drawDistanceGraph();requestAnimationFrame(loop)}
function normalizeKey(e){const byKey=e.key.length===1?e.key.toLowerCase():e.key;return({ArrowUp:'ArrowUp',ArrowDown:'ArrowDown',KeyW:'w',KeyS:'s',KeyR:'r'}[e.code]||byKey)}
function enterFullscreenOnce(){const el=document.querySelector('.game-shell'),doc=document;if(doc.fullscreenElement||doc.webkitFullscreenElement)return;const request=el.requestFullscreen||el.webkitRequestFullscreen;if(request){const result=request.call(el);if(result&&result.catch)result.catch(()=>{})}}
window.addEventListener('keydown',e=>{const key=normalizeKey(e);keys.add(key);if(['ArrowUp','ArrowDown','w','s',' '].includes(key))e.preventDefault();if(key==='r')restartGame()});window.addEventListener('keyup',e=>keys.delete(normalizeKey(e)));
function bindMobileButton(id,key){const btn=document.getElementById(id);if(!btn)return;const press=e=>{e.preventDefault();mobileKeys.add(key);btn.classList.add('active')};const release=e=>{e.preventDefault();mobileKeys.delete(key);btn.classList.remove('active')};btn.addEventListener('pointerdown',press);btn.addEventListener('pointerup',release);btn.addEventListener('pointercancel',release);btn.addEventListener('pointerleave',release);btn.addEventListener('contextmenu',e=>e.preventDefault())}
function setGraphFromPointer(e){if(railStyle!=='graph'||graphLocked())return;if(e.cancelable)e.preventDefault();selectedGraphArchive=null;const rect=distanceCanvas.getBoundingClientRect(),m=graphMetrics(),x=((e.clientX-rect.left)/rect.width)*m.dw,y=((e.clientY-rect.top)/rect.height)*m.dh,idx=Math.max(1,Math.min(graphTargets.length-1,Math.round(((x-m.x0)/m.gw)*(graphTargets.length-1)))),value=Math.max(0,Math.min(lanes.length-1,((y-m.mt)/m.gh)*(lanes.length-1)));if(lastGraphIndex===null){graphTargets[idx]=value}else{const from=Math.min(lastGraphIndex,idx),to=Math.max(lastGraphIndex,idx);for(let i=from;i<=to;i++){const a=to===from?0:(i-from)/(to-from);graphTargets[i]=lastGraphValue*(1-a)+value*a}}graphTargets[0]=2;lastGraphIndex=idx;lastGraphValue=value;buildGraphPath()}
distanceCanvas.addEventListener('pointerdown',e=>{enterFullscreenOnce();if(e.cancelable)e.preventDefault();graphDrawing=true;lastGraphIndex=null;lastGraphValue=null;distanceCanvas.setPointerCapture&&distanceCanvas.setPointerCapture(e.pointerId);setGraphFromPointer(e)},{passive:false});
distanceCanvas.addEventListener('pointermove',e=>{if(graphDrawing)setGraphFromPointer(e)},{passive:false});
window.addEventListener('pointerup',e=>{if(e.cancelable&&graphDrawing)e.preventDefault();graphDrawing=false;lastGraphIndex=null;lastGraphValue=null},{passive:false});
bindMobileButton('upBtn','ArrowUp');bindMobileButton('downBtn','ArrowDown');window.addEventListener('blur',()=>{mobileKeys.clear();document.querySelectorAll('.move-btn').forEach(b=>b.classList.remove('active'))});gameOverRestartBtn.addEventListener('click',()=>{enterFullscreenOnce();restartGame()});railStyleBtn.addEventListener('click',()=>{enterFullscreenOnce();switchRailStyle()});previewPlayBtn.addEventListener('click',()=>{enterFullscreenOnce();if(railStyle!=='graph'||graphLocked())return;if(railPhase!=='preview'){railPhase='preview';gameState='running';statusEl.textContent=phaseStatusText()}if(previewPlaying){setPreviewTime(elapsed);previewPlaying=false;statusEl.textContent='Vorschau pausiert'}else{if(previewTime>=timeLimit)setPreviewTime(0);startTime=performance.now()-previewTime*1000;previewPlaying=true;statusEl.textContent='Vorschau'}updateModeLabels()});previewSlider.addEventListener('input',()=>{if(railStyle!=='graph'||graphLocked())return;railPhase='preview';gameState='running';previewPlaying=false;setPreviewTime(parseFloat(previewSlider.value));statusEl.textContent='Vorschau pausiert';updateModeLabels()});graphPhaseBtn.addEventListener('click',()=>{enterFullscreenOnce();if(railStyle!=='graph')return;previewPlaying=false;buildGraphPath();resetRailGraphAttempt('play')});graphResetBtn.addEventListener('click',()=>{enterFullscreenOnce();if(railStyle!=='graph'||graphLocked())return;resetGraphToMiddle();resetRailGraphAttempt('plan')});resetGame(1);requestAnimationFrame(loop);
</script>
