<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retro Rail Survival</title>
  <style>
    :root {
      --bg: #141821;
      --panel: #22283a;
      --grass-1: #355e3b;
      --grass-2: #2b4d31;
      --rail: #c4b48a;
      --rail-dark: #655d4b;
      --train-red: #b83b3b;
      --train-blue: #355fa8;
      --train-yellow: #d3a331;
      --text: #f4e7b3;
      --accent: #9ef08f;
      --danger: #ff6464;
      --shadow: rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background:
        radial-gradient(circle at top, #2a3146 0%, var(--bg) 60%),
        var(--bg);
      color: var(--text);
      font-family: "Courier New", monospace;
      overflow: hidden;
    }

    .game-shell {
      width: min(98vw, 1500px);
      padding: 18px;
      border: 4px solid #3d4358;
      border-radius: 18px;
      background: linear-gradient(180deg, #202638, #161b29);
      box-shadow: 0 20px 60px var(--shadow), inset 0 0 0 3px rgba(255,255,255,0.05);
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.2rem, 3vw, 2rem);
      letter-spacing: 2px;
      text-shadow: 3px 3px 0 #000;
    }

    .hud {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      font-size: 0.9rem;
    }

    .badge {
      padding: 7px 10px;
      border: 2px solid #555f7c;
      border-radius: 10px;
      background: var(--panel);
      box-shadow: inset 0 -3px 0 rgba(0,0,0,0.25);
      white-space: nowrap;
    }

    .play-area {
      display: grid;
      grid-template-columns: minmax(420px, 1fr) 520px;
      gap: 14px;
      align-items: start;
    }

    #game {
      width: 100%;
      height: auto;
      aspect-ratio: 16 / 10;
      display: block;
      border: 5px solid #0c0f17;
      border-radius: 14px;
      background: var(--grass-1);
      image-rendering: pixelated;
      box-shadow: inset 0 0 0 4px rgba(255,255,255,0.06);
    }

    .distance-panel {
      position: relative;
      min-height: 100%;
      border: 5px solid #0c0f17;
      border-radius: 14px;
      padding: 12px;
      background:
        linear-gradient(180deg, #1f2638, #141a28),
        var(--panel);
      box-shadow: inset 0 0 0 4px rgba(255,255,255,0.06);
      overflow: hidden;
    }

    .distance-title {
      margin: 0 0 8px;
      text-align: center;
      font-size: 0.9rem;
      letter-spacing: 1px;
      text-shadow: 2px 2px 0 #000;
    }

    #distanceCanvas {
      width: 100%;
      height: calc(100% - 82px);
      min-height: 360px;
      display: block;
      border: 3px solid #3d4358;
      border-radius: 10px;
      background: #101622;
      image-rendering: pixelated;
    }

    .distance-value {
      margin-top: 8px;
      padding: 8px;
      border: 2px solid #555f7c;
      border-radius: 10px;
      background: rgba(0,0,0,0.22);
      text-align: center;
      line-height: 1.35;
      box-shadow: inset 0 -3px 0 rgba(0,0,0,0.25);
    }

    .distance-value strong {
      display: block;
      color: var(--accent);
      font-size: 1.35rem;
      text-shadow: 2px 2px 0 #000;
    }

    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
      color: #d8d2aa;
      font-size: 0.9rem;
      line-height: 1.35;
    }

    button {
      cursor: pointer;
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      color: #172017;
      background: var(--accent);
      font-family: inherit;
      font-weight: bold;
      box-shadow: 0 5px 0 #4f9d45;
      transition: transform 0.08s ease, box-shadow 0.08s ease;
    }

    button:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #4f9d45;
    }

    .tablet-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 22px;
      margin-top: 14px;
      padding: 14px 18px;
      border: 4px solid #0c0f17;
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(42,49,70,0.95), rgba(22,27,41,0.95));
      box-shadow:
        inset 0 0 0 3px rgba(255,255,255,0.05),
        0 10px 24px rgba(0,0,0,0.22);
    }

    .move-btn {
      width: 118px;
      height: 86px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 4px;
      border: 3px solid #606b8d;
      border-radius: 18px;
      color: #f4e7b3;
      background:
        linear-gradient(180deg, #303a54 0%, #1b2233 100%);
      box-shadow:
        0 7px 0 #0c0f17,
        0 12px 22px rgba(0,0,0,0.28),
        inset 0 2px 0 rgba(255,255,255,0.08);
      font-family: inherit;
      font-weight: bold;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    .move-btn .arrow {
      font-size: 2.1rem;
      line-height: 1;
      color: var(--accent);
      text-shadow: 3px 3px 0 #000;
    }

    .move-btn .label {
      font-size: 0.78rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      opacity: 0.95;
    }

    .move-btn:active,
    .move-btn.active {
      transform: translateY(5px);
      box-shadow:
        0 2px 0 #0c0f17,
        0 5px 12px rgba(0,0,0,0.3),
        inset 0 2px 0 rgba(255,255,255,0.08);
      background: linear-gradient(180deg, #3b4766 0%, #222a3e 100%);
    }

    @media (max-width: 900px) {
      body { align-items: flex-start; padding-top: 10px; overflow: auto; }
      .game-shell { padding: 12px; }
      header, .controls { flex-direction: column; align-items: stretch; }
      .hud { justify-content: space-between; }
      .play-area { grid-template-columns: 1fr; }
      .distance-panel { min-height: 260px; }
      #distanceCanvas { height: 220px; min-height: 220px; }
      .tablet-controls { display: flex; }
    }
  </style>
</head>
<body>
  <main class="game-shell">
    <header>
      <h1>RETRO RAIL SURVIVAL</h1>
      <div class="hud">
        <div class="badge">Level: <span id="level">1</span></div>
        <div class="badge">Zeit: <span id="time">0.0</span>s</div>
        <div class="badge">Status: <span id="status">Bereit</span></div>
      </div>
    </header>

    <div class="play-area">
      <canvas id="game" width="960" height="600"></canvas>

      <aside class="distance-panel" aria-label="Abstand zum Startpunkt">
        <p class="distance-title">WEG-ZEIT-DIAGRAMM</p>
        <canvas id="distanceCanvas" width="520" height="460"></canvas>
        <div class="distance-value">
          Strecke / Zeit
          <strong><span id="distanceValue">0</span>%</strong>
          <span id="distanceBlocks">t = 0.0s</span>
        </div>
      </aside>
    </div>

    <div class="tablet-controls" aria-label="Touch-Steuerung für iPad">
      <button id="upBtn" class="move-btn" aria-label="Ein Gleis nach oben">
        <span class="arrow">▲</span>
        <span class="label">Gleis hoch</span>
      </button>

      <button id="downBtn" class="move-btn" aria-label="Ein Gleis nach unten">
        <span class="arrow">▼</span>
        <span class="label">Gleis runter</span>
      </button>
    </div>

    <section class="controls">
      <div>
        Steuerung: ↑/↓ oder W/S. Ziel: Überlebe 20 Sekunden auf den Schienen. Bewege dich mit ↑/↓ oder W/S zwischen den Gleisen. Seitliche Bewegung ist deaktiviert.
      </div>
      <button id="restartBtn">Neustart</button>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const distanceCanvas = document.getElementById("distanceCanvas");
    const dctx = distanceCanvas.getContext("2d");

    const levelEl = document.getElementById("level");
    const timeEl = document.getElementById("time");
    const statusEl = document.getElementById("status");
    const restartBtn = document.getElementById("restartBtn");
    const distanceValueEl = document.getElementById("distanceValue");
    const distanceBlocksEl = document.getElementById("distanceBlocks");

    const W = canvas.width;
    const H = canvas.height;

    const keys = new Set();
    const mobileKeys = new Set();

    let player;
    let trains;
    let sparks;
    let gameState;
    let level;
    let startTime;
    let elapsed;
    let lastTime;
    let spawnTimer;
    let distanceHistory;
    let safeRailSequence;
    let safeRailIndex;
    let currentSafeRail;
    let nextWaveTime;

    const rails = [110, 205, 300, 395, 490];
    const safeTop = 44;
    const safeBottom = 520;
    const timeLimit = 20;

    const colors = ["#b83b3b", "#355fa8", "#d3a331", "#7b4fac", "#2f9b8f"];

    // Feste Richtung pro Schiene:
    //  1 = von links nach rechts
    // -1 = von rechts nach links
    // Nicht alle Schienen fahren gleich, aber jede einzelne Schiene bleibt logisch eindeutig.
    const railDirections = [1, -1, 1, -1, 1];

    function resetGame(nextLevel = 1) {
      level = nextLevel;
      player = {
        x: W / 2,
        y: rails[2],
        w: 28,
        h: 28,
        speed: 230,
        alive: true,
        won: false,
        targetRail: 2,
        moveQueue: [],
        isChangingRail: false,
        blink: 0
      };
      trains = [];
      sparks = [];
      gameState = "running";
      startTime = performance.now();
      elapsed = 0;
      lastTime = performance.now();
      spawnTimer = 0.6;
      distanceHistory = [];
      safeRailSequence = generateSafeRailSequence();
      safeRailIndex = 0;
      currentSafeRail = safeRailSequence[safeRailIndex];
      nextWaveTime = rand(1.0, 1.45);
      seedInitialTrains();
      statusEl.textContent = "Läuft";
      levelEl.textContent = level;
    }

    function rectsOverlap(a, b) {
      return a.x < b.x + b.w &&
             a.x + a.w > b.x &&
             a.y < b.y + b.h &&
             a.y + a.h > b.y;
    }

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function createTrainOnRail(railIndex, startInside = false) {
      const direction = railDirections[railIndex];
      const trainLength = rand(150, 260) + level * 10;
      const speed = rand(185, 300) + level * 22;
      const y = rails[railIndex] - 21;
      let x;

      if (startInside) {
        // Anfangszüge sind bereits sichtbar, aber nicht direkt übereinander.
        x = direction === 1
          ? rand(-trainLength + 20, W - 120)
          : rand(120, W - 20);
      } else {
        x = direction === 1 ? -trainLength - 30 : W + 30;
      }

      return {
        x,
        y,
        w: trainLength,
        h: 42,
        speed,
        direction,
        color: colors[Math.floor(Math.random() * colors.length)],
        railIndex,
        windowOffset: Math.random() * 10
      };
    }

    function generateSafeRailSequence() {
      // Erstellt pro Durchgang eine neue faire Route.
      // Regel: Der sichere Weg bewegt sich immer nur ein Gleis nach oben/unten.
      // Zusätzlich muss jedes der fünf Gleise mindestens einmal vorkommen.
      const sequence = [2];
      const visited = new Set(sequence);
      let current = 2;
      let direction = Math.random() < 0.5 ? -1 : 1;

      while (sequence.length < 18 || visited.size < rails.length) {
        const options = [];
        if (current > 0) options.push(current - 1);
        if (current < rails.length - 1) options.push(current + 1);

        // Bevorzugt noch nicht besuchte Gleise, damit alle 5 genutzt werden müssen.
        let weightedOptions = [...options];
        const unvisitedOptions = options.filter(option => !visited.has(option));
        if (unvisitedOptions.length > 0 && Math.random() < 0.75) {
          weightedOptions = unvisitedOptions;
        }

        // Kleine Tendenz, die Richtung beizubehalten, damit die Route nicht hektisch wirkt.
        const preferred = current + direction;
        if (weightedOptions.includes(preferred) && Math.random() < 0.65) {
          current = preferred;
        } else {
          current = weightedOptions[Math.floor(Math.random() * weightedOptions.length)];
        }

        if (current === 0) direction = 1;
        if (current === rails.length - 1) direction = -1;
        if (Math.random() < 0.25) direction *= -1;

        sequence.push(current);
        visited.add(current);
      }

      return sequence;
    }

    function seedInitialTrains() {
      // Direkt zu Beginn fahren Züge, aber das Startgleis bleibt frei.
      // Dadurch ist das Spiel ab Sekunde 0 aktiv, aber nicht unfair.
      rails.forEach((_, railIndex) => {
        if (railIndex === currentSafeRail) return;
        const train = createTrainOnRail(railIndex, true);
        train.speed = 210 + level * 18;

        // Anfangszüge sichtbar, aber nicht direkt am Spielerzentrum.
        if (train.direction === 1 && train.x < W / 2 && train.x + train.w > W / 2 - 80) {
          train.x -= 220;
        }
        if (train.direction === -1 && train.x < W / 2 + 80 && train.x + train.w > W / 2) {
          train.x += 220;
        }

        trains.push(train);
      });
    }

    function spawnDangerWave() {
      // Das sichere Gleis wandert immer nur um ein Gleis weiter.
      // Dadurch ist Überleben immer möglich, aber man muss langfristig alle Gleise benutzen.
      safeRailIndex = Math.min(safeRailIndex + 1, safeRailSequence.length - 1);
      currentSafeRail = safeRailSequence[safeRailIndex];

      rails.forEach((_, railIndex) => {
        if (railIndex === currentSafeRail) return;

        const train = createTrainOnRail(railIndex, false);
        train.speed = 235 + level * 20;
        train.w = rand(210, 300);
        trains.push(train);
      });
    }

    function spawnTrain() {
      // Pro Schiene gilt eine feste Richtung. So können keine Züge
      // von links und rechts gleichzeitig auf derselben Schiene fahren.
      const shuffledRails = rails
        .map((_, index) => index)
        .sort(() => Math.random() - 0.5);

      for (const railIndex of shuffledRails) {
        const direction = railDirections[railIndex];
        const testTrainLength = 260 + level * 10;

        // Mindestabstand zum zuletzt gestarteten Zug auf derselben Schiene.
        const entryClearance = 260;
        const entryIsBlocked = trains.some(t => {
          if (t.railIndex !== railIndex) return false;

          if (direction === 1) {
            return t.x < entryClearance;
          } else {
            return t.x + t.w > W - entryClearance;
          }
        });

        if (entryIsBlocked) continue;

        trains.push(createTrainOnRail(railIndex));

        return;
      }
    }

    function drawPixelText(text, x, y, size = 18, align = "left", color = "#f4e7b3") {
      ctx.save();
      ctx.font = `bold ${size}px Courier New`;
      ctx.textAlign = align;
      ctx.fillStyle = "#000";
      ctx.fillText(text, x + 3, y + 3);
      ctx.fillStyle = color;
      ctx.fillText(text, x, y);
      ctx.restore();
    }

    function drawBackground() {
      ctx.fillStyle = "#355e3b";
      ctx.fillRect(0, 0, W, H);

      const tile = 32;
      for (let y = 0; y < H; y += tile) {
        for (let x = 0; x < W; x += tile) {
          if (((x / tile) + (y / tile)) % 2 === 0) {
            ctx.fillStyle = "rgba(0,0,0,0.08)";
            ctx.fillRect(x, y, tile, tile);
          }
        }
      }

      drawPixelText("SURVIVE", W / 2, 42, 28, "center", "#9ef08f");
      drawPixelText(`ZEIT: ${elapsed.toFixed(1)}s`, W - 34, 42, 22, "right", "#f4e7b3");
    }

    function drawRails() {
      rails.forEach((railY, index) => {
        // Fast die gesamte Spielfläche besteht aus Schienenbereichen.
        ctx.fillStyle = index % 2 === 0 ? "#5b5a57" : "#50504d";
        ctx.fillRect(0, railY - 48, W, 96);

        for (let x = 0; x < W; x += 18) {
          ctx.fillStyle = x % 36 === 0 ? "#73706a" : "#484844";
          ctx.fillRect(x + (index * 7) % 13, railY - 40 + (x % 9), 6, 6);
          ctx.fillRect(x + 9, railY + 31 - (x % 11), 5, 5);
        }

        for (let x = -10; x < W; x += 42) {
          ctx.fillStyle = "#5a3826";
          ctx.fillRect(x, railY - 30, 12, 60);
          ctx.fillStyle = "rgba(255,255,255,0.08)";
          ctx.fillRect(x, railY - 30, 4, 60);
        }

        ctx.fillStyle = "#332d28";
        ctx.fillRect(0, railY - 18, W, 7);
        ctx.fillRect(0, railY + 13, W, 7);
        ctx.fillStyle = "#c4b48a";
        ctx.fillRect(0, railY - 21, W, 5);
        ctx.fillRect(0, railY + 10, W, 5);
      });
    }

    function drawTrain(t) {
      ctx.save();
      ctx.translate(t.x, t.y);

      // Schatten
      ctx.fillStyle = "rgba(0,0,0,0.35)";
      ctx.fillRect(8, 8, t.w, t.h);

      // Körper
      ctx.fillStyle = t.color;
      ctx.fillRect(0, 0, t.w, t.h);
      ctx.fillStyle = "rgba(255,255,255,0.16)";
      ctx.fillRect(0, 0, t.w, 8);
      ctx.fillStyle = "rgba(0,0,0,0.25)";
      ctx.fillRect(0, t.h - 8, t.w, 8);

      // Front
      ctx.fillStyle = "#1b1f29";
      if (t.direction === 1) {
        ctx.fillRect(t.w - 18, 6, 12, 30);
      } else {
        ctx.fillRect(6, 6, 12, 30);
      }

      // Fenster
      const start = 28 + t.windowOffset;
      for (let x = start; x < t.w - 35; x += 35) {
        ctx.fillStyle = "#bdefff";
        ctx.fillRect(x, 10, 18, 12);
        ctx.fillStyle = "rgba(0,0,0,0.18)";
        ctx.fillRect(x, 22, 18, 4);
      }

      // Räder
      for (let x = 20; x < t.w - 15; x += 42) {
        ctx.fillStyle = "#111";
        ctx.fillRect(x, t.h - 4, 16, 8);
      }

      ctx.restore();
    }

    function drawPlayer() {
      ctx.save();
      const x = player.x - player.w / 2;
      const y = player.y - player.h / 2;

      if (!player.alive && Math.floor(performance.now() / 120) % 2 === 0) {
        ctx.globalAlpha = 0.45;
      }

      // Schatten
      ctx.fillStyle = "rgba(0,0,0,0.35)";
      ctx.fillRect(x + 5, y + 7, player.w, player.h);

      // Kopf/Helm aus Vogelperspektive
      ctx.fillStyle = "#f0c08a";
      ctx.fillRect(x + 6, y + 2, 16, 16);
      ctx.fillStyle = "#5a3425";
      ctx.fillRect(x + 5, y, 18, 7);

      // Körper
      ctx.fillStyle = "#4ea1ff";
      ctx.fillRect(x + 4, y + 16, 20, 12);
      ctx.fillStyle = "#2b5a96";
      ctx.fillRect(x + 8, y + 20, 12, 8);

      // Arme
      ctx.fillStyle = "#f0c08a";
      ctx.fillRect(x, y + 16, 5, 12);
      ctx.fillRect(x + 23, y + 16, 5, 12);

      ctx.restore();
    }

    function drawSparks() {
      sparks.forEach(s => {
        ctx.fillStyle = s.color;
        ctx.fillRect(s.x, s.y, s.size, s.size);
      });
    }

    function getProgressData() {
      const survivalProgress = Math.max(0, Math.min(1, elapsed / timeLimit));

      // Tatsächliche Position zwischen den Gleisen, nicht nur das Zielgleis.
      // Dadurch sieht man im Graphen die langsamere Bewegung als schräge Linie.
      const railSpan = rails[rails.length - 1] - rails[0];
      const continuousRailIndex = Math.max(
        0,
        Math.min(rails.length - 1, ((player.y - rails[0]) / railSpan) * (rails.length - 1))
      );
      const nearestRail = Math.round(continuousRailIndex);
      const graphPosition = 1 - (continuousRailIndex / (rails.length - 1));

      return {
        totalDistance: timeLimit,
        walkedDistance: elapsed,
        progress: survivalProgress,
        percent: Math.round(survivalProgress * 100),
        crossedRails: nearestRail + 1,
        graphPosition
      };
    }

    function drawDistanceGraph() {
      const dw = distanceCanvas.width;
      const dh = distanceCanvas.height;
      const data = getProgressData();
      const marginLeft = 58;
      const marginRight = 28;
      const marginTop = 26;
      const marginBottom = 48;
      const graphW = dw - marginLeft - marginRight;
      const graphH = dh - marginTop - marginBottom;
      const x0 = marginLeft;
      const y0 = dh - marginBottom;
      const maxTime = timeLimit;

      dctx.clearRect(0, 0, dw, dh);
      dctx.fillStyle = "#101622";
      dctx.fillRect(0, 0, dw, dh);

      // Raster: y = Strecke, x = Zeit
      dctx.fillStyle = "rgba(244,231,179,0.08)";
      for (let i = 0; i <= 5; i++) {
        const y = y0 - (i / 5) * graphH;
        dctx.fillRect(x0, y, graphW, 2);
      }
      for (let i = 0; i <= 4; i++) {
        const x = x0 + (i / 4) * graphW;
        dctx.fillRect(x, marginTop, 2, graphH);
      }

      // Achsen
      dctx.fillStyle = "#c4b48a";
      dctx.fillRect(x0, marginTop, 3, graphH + 3);
      dctx.fillRect(x0, y0, graphW, 3);

      // Achsenbeschriftung sauber getrennt
      dctx.font = "bold 12px Courier New";
      dctx.fillStyle = "#f4e7b3";
      dctx.textAlign = "center";
      dctx.fillText("Zeit t in s  (0–20 Sekunden)", x0 + graphW / 2, dh - 12);

      dctx.save();
      dctx.translate(13, marginTop + graphH / 2);
      dctx.rotate(-Math.PI / 2);
      dctx.fillText("Gleisposition", 0, 0);
      dctx.restore();

      // Skalenwerte x-Achse: 0, 5, 10, 15, 20 Sekunden
      dctx.font = "bold 11px Courier New";
      dctx.textAlign = "center";
      for (let t = 0; t <= timeLimit; t += 5) {
        const x = x0 + (t / timeLimit) * graphW;
        dctx.fillStyle = "#c4b48a";
        dctx.fillRect(x - 1, y0 - 4, 2, 8);
        dctx.fillStyle = "#f4e7b3";
        dctx.fillText(`${t}s`, x, y0 + 18);
      }

      // Skalenwerte y-Achse
      dctx.textAlign = "right";
      dctx.fillText("G1", x0 - 6, marginTop + 5);
      dctx.fillText("G5", x0 - 6, y0 + 4);

      // Schienen als horizontale Linien im Diagramm
      rails.forEach((railY, i) => {
        const railProgress = 1 - (i / (rails.length - 1));
        const y = y0 - railProgress * graphH;
        dctx.fillStyle = "rgba(196,180,138,0.45)";
        dctx.fillRect(x0, y - 2, graphW, 4);
        dctx.fillStyle = "#f4e7b3";
        dctx.textAlign = "left";
        dctx.fillText(`G${i + 1}`, x0 + 5, y - 6);
      });

      // Aktuellen Messpunkt speichern
      if (gameState === "running") {
        const last = distanceHistory[distanceHistory.length - 1];
        if (!last || elapsed - last.t > 0.05) {
          distanceHistory.push({ t: Math.min(elapsed, timeLimit), p: data.graphPosition });
        }
      }

      const visibleHistory = distanceHistory.filter(point => point.t <= timeLimit);

      // Kurve zeichnen: x = Zeit, y = Abstand vom Start
      if (visibleHistory.length > 1) {
        dctx.beginPath();
        visibleHistory.forEach((point, index) => {
          const x = x0 + (point.t / timeLimit) * graphW;
          const y = y0 - point.p * graphH;
          if (index === 0) dctx.moveTo(x, y);
          else dctx.lineTo(x, y);
        });
        dctx.strokeStyle = "#9ef08f";
        dctx.lineWidth = 4;
        dctx.stroke();
      }

      // Aktueller Punkt
      const currentT = Math.min(elapsed, timeLimit);
      const px = x0 + (currentT / timeLimit) * graphW;
      const py = y0 - data.graphPosition * graphH;
      dctx.fillStyle = "#000";
      dctx.fillRect(px - 7, py - 7, 14, 14);
      dctx.fillStyle = "#4ea1ff";
      dctx.fillRect(px - 5, py - 5, 10, 10);

      // Funktionshinweis oben im Diagramm
      dctx.font = "bold 12px Courier New";
      dctx.textAlign = "center";
      dctx.fillStyle = "#9ef08f";
      dctx.fillText("G(t)", x0 + graphW - 18, marginTop + 14);
    }

    function drawOverlay() {
      if (gameState === "running") return;

      ctx.fillStyle = "rgba(0,0,0,0.62)";
      ctx.fillRect(0, 0, W, H);

      if (gameState === "dead") {
        drawPixelText("GAME OVER", W / 2, H / 2 - 35, 54, "center", "#ff6464");
        drawPixelText("Du wurdest vom Zug erwischt!", W / 2, H / 2 + 12, 22, "center", "#f4e7b3");
        drawPixelText("Drücke R oder Neustart", W / 2, H / 2 + 52, 20, "center", "#9ef08f");
      }

      if (gameState === "timeout") {
        drawPixelText("ZEIT ABGELAUFEN", W / 2, H / 2 - 35, 46, "center", "#ff6464");
        drawPixelText("Du hast das Level nicht in 20 Sekunden geschafft.", W / 2, H / 2 + 12, 21, "center", "#f4e7b3");
        drawPixelText("Drücke R oder Neustart", W / 2, H / 2 + 52, 20, "center", "#9ef08f");
      }

      if (gameState === "won") {
        drawPixelText("ÜBERLEBT!", W / 2, H / 2 - 40, 54, "center", "#9ef08f");
        drawPixelText(`Du hast ${timeLimit} Sekunden geschafft.`, W / 2, H / 2 + 8, 23, "center", "#f4e7b3");
        drawPixelText("Drücke R für ein schwereres Level", W / 2, H / 2 + 50, 20, "center", "#9ef08f");
      }
    }

    function updatePlayer(dt) {
      if (gameState !== "running") return;

      const active = new Set([...keys, ...mobileKeys]);

      // Survival-Modus: Ein Gleiswechsel wird immer vollständig ausgeführt.
      // Neue Eingaben werden in eine Warteschlange gelegt und danach nacheinander abgearbeitet.
      if (!player.moveCooldown) player.moveCooldown = 0;
      player.moveCooldown = Math.max(0, player.moveCooldown - dt);

      const currentlyMoving = Math.abs(rails[player.targetRail] - player.y) > 0.5;
      const currentPlannedRail = player.moveQueue.length > 0
        ? player.moveQueue[player.moveQueue.length - 1]
        : player.targetRail;

      if (player.moveCooldown === 0 && player.moveQueue.length < 3) {
        if (active.has("ArrowUp") || active.has("w")) {
          const nextRail = Math.max(0, currentPlannedRail - 1);
          if (nextRail !== currentPlannedRail) {
            player.moveQueue.push(nextRail);
            player.moveCooldown = 0.18;
          }
        } else if (active.has("ArrowDown") || active.has("s")) {
          const nextRail = Math.min(rails.length - 1, currentPlannedRail + 1);
          if (nextRail !== currentPlannedRail) {
            player.moveQueue.push(nextRail);
            player.moveCooldown = 0.18;
          }
        }
      }

      if (!currentlyMoving && player.moveQueue.length > 0) {
        player.targetRail = player.moveQueue.shift();
      }

      player.x = W / 2;
      const targetY = rails[player.targetRail];
      const distanceToTarget = targetY - player.y;
      const railMoveSpeed = 120; // Pixel pro Sekunde: konstante, lineare Geschwindigkeit

      if (Math.abs(distanceToTarget) <= railMoveSpeed * dt) {
        player.y = targetY;
      } else {
        player.y += Math.sign(distanceToTarget) * railMoveSpeed * dt;
      }

      // Survival: Kein Ziel oben. Man muss 20 Sekunden überleben.
    }

    function updateTrains(dt) {
      if (gameState !== "running") return;

      // Gesteuerte Zugwellen statt reiner Zufallszüge:
      // Zu jedem Zeitpunkt bleibt ein Gleis als Lösung frei.
      // Dieses sichere Gleis wandert durch alle fünf Gleise.
      if (elapsed >= nextWaveTime) {
        spawnDangerWave();
        nextWaveTime += rand(2.05, 2.55);
      }

      trains.forEach(t => {
        t.x += t.speed * t.direction * dt;
      });

      trains = trains.filter(t => t.direction === 1 ? t.x < W + 80 : t.x + t.w > -80);
    }

    function updateSparks(dt) {
      sparks.forEach(s => {
        s.x += s.vx * dt;
        s.y += s.vy * dt;
        s.life -= dt;
        s.size *= 0.98;
      });
      sparks = sparks.filter(s => s.life > 0);
    }

    function checkCollisions() {
      if (gameState !== "running") return;

      const p = {
        x: player.x - 11,
        y: player.y - 13,
        w: 22,
        h: 26
      };

      for (const t of trains) {
        const trainHitbox = {
          x: t.x + 5,
          y: t.y + 5,
          w: t.w - 10,
          h: t.h - 10
        };

        if (rectsOverlap(p, trainHitbox)) {
          player.alive = false;
          gameState = "dead";
          statusEl.textContent = "Tot";
          createExplosion(player.x, player.y);
          break;
        }
      }
    }

    function createExplosion(x, y) {
      for (let i = 0; i < 38; i++) {
        sparks.push({
          x,
          y,
          vx: rand(-180, 180),
          vy: rand(-180, 180),
          life: rand(0.3, 0.8),
          size: rand(3, 8),
          color: Math.random() < 0.5 ? "#ffdd66" : "#ff6464"
        });
      }
    }

    function updateHud() {
      if (gameState === "running") {
        elapsed = (performance.now() - startTime) / 1000;
        if (elapsed >= timeLimit && player.alive) {
          elapsed = timeLimit;
          gameState = "won";
          player.won = true;
          statusEl.textContent = "Überlebt";
        }
      }
      const data = getProgressData();
      timeEl.textContent = elapsed.toFixed(1);
      levelEl.textContent = level;
      distanceValueEl.textContent = data.percent;
      distanceBlocksEl.textContent = `t = ${elapsed.toFixed(1)} / ${timeLimit}s | Gleis ${data.crossedRails}`;
    }

    function loop(now) {
      const dt = Math.min(0.033, (now - lastTime) / 1000);
      lastTime = now;

      updatePlayer(dt);
      updateTrains(dt);
      updateSparks(dt);
      checkCollisions();
      updateHud();

      drawBackground();
      drawRails();
      trains.forEach(drawTrain);
      drawSparks();
      drawPlayer();
      drawOverlay();
      drawDistanceGraph();

      requestAnimationFrame(loop);
    }

    function normalizeKey(e) {
      const byKey = e.key.length === 1 ? e.key.toLowerCase() : e.key;

      // Zusätzliche Absicherung über event.code, damit links/rechts
      // auch dann funktionieren, wenn e.key vom Browser anders geliefert wird.
      const codeMap = {
        ArrowLeft: "ArrowLeft",
        ArrowRight: "ArrowRight",
        ArrowUp: "ArrowUp",
        ArrowDown: "ArrowDown",
        KeyA: "a",
        KeyD: "d",
        KeyW: "w",
        KeyS: "s",
        KeyR: "r"
      };

      return codeMap[e.code] || byKey;
    }

    window.addEventListener("keydown", (e) => {
      const key = normalizeKey(e);
      keys.add(key);

      if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "w", "a", "s", "d", " "].includes(key)) {
        e.preventDefault();
      }

      if (key === "r") {
        if (gameState === "won") resetGame(level + 1);
        else resetGame(1);
      }
    });

    window.addEventListener("keyup", (e) => {
      const key = normalizeKey(e);
      keys.delete(key);
    });

    restartBtn.addEventListener("click", () => {
      if (gameState === "won") resetGame(level + 1);
      else resetGame(1);
    });

    function bindMobileButton(id, key) {
      const btn = document.getElementById(id);
      if (!btn) return;

      const press = (e) => {
        e.preventDefault();
        mobileKeys.add(key);
        btn.classList.add("active");
      };

      const release = (e) => {
        e.preventDefault();
        mobileKeys.delete(key);
        btn.classList.remove("active");
      };

      btn.addEventListener("pointerdown", press);
      btn.addEventListener("pointerup", release);
      btn.addEventListener("pointercancel", release);
      btn.addEventListener("pointerleave", release);
      btn.addEventListener("contextmenu", (e) => e.preventDefault());
    }

    bindMobileButton("upBtn", "ArrowUp");
    bindMobileButton("downBtn", "ArrowDown");

    window.addEventListener("blur", () => {
      mobileKeys.clear();
      document.querySelectorAll(".move-btn").forEach(btn => btn.classList.remove("active"));
    });

    resetGame(1);
    requestAnimationFrame(loop);
  </script>
</body>
</html>
